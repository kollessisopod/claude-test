services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ostquiz}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Creates the audio/covers buckets on first run.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/audio &&
      mc mb --ignore-existing local/covers &&
      echo 'buckets ready';
      "

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Postgres: "Host=postgres;Database=${POSTGRES_DB:-ostquiz};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Storage__ServiceUrl: "http://minio:9000"
      Storage__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Storage__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      Rawg__ApiKey: ${RAWG_API_KEY:-}
      Admin__Key: ${ADMIN_KEY:-dev-admin-key}
      Tokens__Secret: ${TOKENS_SECRET:-dev-insecure-token-secret-change-me}
      Seed__Enabled: ${SEED_ENABLED:-true}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  admin:
    build: ./admin
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  pgdata:
  miniodata:
