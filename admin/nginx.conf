server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Larger uploads for audio files.
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
